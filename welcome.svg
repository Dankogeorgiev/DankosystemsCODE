<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 608 283" width="608" height="283" role="img" aria-label="DankoSystems — Metalworking Solutions">
  <defs>
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f5f7"/>
      <stop offset="1" stop-color="#dfe2e7"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Тъмносин фон -->
  <rect width="608" height="283" fill="#26315b"/>

  <!-- Светла „плочка" (pill) -->
  <rect x="30" y="74" width="548" height="98" rx="49" fill="url(#pill)" stroke="#c3c8d1" stroke-width="2" filter="url(#ds)"/>

  <!-- Болтове -->
  <circle cx="72" cy="123" r="13" fill="#26315b"/>
  <circle cx="536" cy="123" r="13" fill="#26315b"/>

  <!-- Надпис -->
  <text x="304" y="124" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900"
        font-size="58" letter-spacing="-2" fill="#26315b">DankoSystems</text>

  <!-- Размерни (extension) линии надолу от плочката -->
  <line x1="78" y1="176" x2="78" y2="214" stroke="#c9cdd6" stroke-width="2"/>
  <line x1="530" y1="176" x2="530" y2="214" stroke="#c9cdd6" stroke-width="2"/>

  <!-- Размерна линия със стрелки, прекъсната за текста -->
  <line x1="92" y1="210" x2="112" y2="210" stroke="#c9cdd6" stroke-width="2"/>
  <line x1="496" y1="210" x2="516" y2="210" stroke="#c9cdd6" stroke-width="2"/>
  <!-- Лява стрелка -->
  <path d="M78 210 L92 205 L92 215 Z" fill="#c9cdd6"/>
  <!-- Дясна стрелка -->
  <path d="M530 210 L516 205 L516 215 Z" fill="#c9cdd6"/>

  <!-- Подзаглавие -->
  <text x="304" y="210" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600"
        font-size="17" letter-spacing="5" fill="#d3d7df">METALWORKING&#160;&#160;SOLUTIONS</text>
</svg>
